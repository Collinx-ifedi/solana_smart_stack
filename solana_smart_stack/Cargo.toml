[package]
name = "solana_smart_stack"
version = "0.1.0"
edition = "2021"
description = "Autonomous Jito Transaction Stack with gRPC Streaming"
authors = ["Your Name <your.email@example.com>"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/your-repo/solana_smart_stack"
keywords = ["solana", "jito", "mev", "grpc"]
categories = ["cryptography::cryptocurrencies", "network-programming"]
rust-version = "1.75" # Enforces a minimum compiler version for reproducible builds
publish = false       # CRITICAL: Prevents accidental publishing of your proprietary stack to crates.io

[dependencies]
# Async Runtime & Concurrency
# Added 'tracing' feature to tokio for deep async task observability in production
tokio = { version = "1.35", features = ["full", "tracing"] }
futures-util = "0.3.30"

# Solana Core Cryptography & RPC
solana-sdk = "=2.3.1"
solana-client = "=2.3.1"
solana-transaction-status = "=2.3.1"
solana-account-decoder = "=2.3.1"

# Real-time Network Streaming (Yellowstone Geyser)
yellowstone-grpc-client = "2.0.0"
yellowstone-grpc-proto = "8.0.0"

# External HTTP (Jito Block Engine API & OpenRouter AI)
# Stripped default features to reduce binary bloat, strictly relying on rustls
reqwest = { version = "0.12.0", default-features = false, features = ["json", "rustls-tls", "charset"] }

# Serialization & Encoding
serde = { version = "1.0.197", features = ["derive"] }
serde_json = "1.0.114"
bincode = "1.3.3"
base64 = "0.22.0"
bs58 = "0.5.0" # FIXED: Added to support base58 encoding in jito_executor.rs

# Environment & Error Handling
anyhow = "1.0.81"
dotenvy = "0.15.7"

# High-Performance Asynchronous Logging
tracing = "0.1.40"
# Added 'json' feature to allow parsing logs into external observability tools (e.g., Datadog/ELK)
tracing-subscriber = { version = "0.3.18", features = ["env-filter", "fmt", "json"] }

# Cryptography & Randomness
rand = "0.8.5" # FIXED: Added to support tip account rotation in jito_executor.rs

# =========================================================
# PRODUCTION COMPILER PROFILES (LATENCY & SIZE OPTIMIZATIONS)
# =========================================================

[profile.release]
opt-level = 3          # Maximum speed optimization
lto = "fat"            # Link Time Optimization across all crates (crucial for execution speed)
codegen-units = 1      # Reduces parallel code generation in favor of runtime speed
panic = "abort"        # Drops the stack unwinding payload to save binary weight and improve speed
strip = true           # Removes debug symbols from the compiled executable to reduce size

# =========================================================
# DEVELOPMENT COMPILER PROFILES
# =========================================================

# Optimizes dependencies heavily during local development. 
# Your code compiles fast, but heavy external crates (like solana-sdk) run at production speeds.
[profile.dev.package."*"]
opt-level = 3
